<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Detail - LMS Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: var(--gray-50);
        }

        .module-hero {
            background: var(--gradient-primary);
            color: white;
            padding: var(--space-2xl) var(--space-lg);
            text-align: center;
        }

        .module-hero h1 {
            color: white;
            margin-bottom: var(--space-md);
        }

        .module-hero p {
            font-size: var(--text-lg);
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto var(--space-xl);
        }

        .module-meta-hero {
            display: flex;
            justify-content: center;
            gap: var(--space-2xl);
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: var(--text-base);
        }

        .module-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-2xl) var(--space-lg);
        }

        .video-section {
            background: white;
            border-radius: var(--radius-2xl);
            padding: var(--space-xl);
            box-shadow: var(--shadow-xl);
            margin-bottom: var(--space-2xl);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: var(--radius-lg);
            background: var(--gray-900);
            margin-bottom: var(--space-lg);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-900) 100%);
            color: white;
        }

        .play-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-4xl);
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-xl);
            margin-bottom: var(--space-lg);
        }

        .play-button:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-2xl), var(--shadow-glow);
        }

        .video-controls {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        .content-section {
            background: white;
            border-radius: var(--radius-2xl);
            padding: var(--space-2xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-2xl);
        }

        .content-section h2 {
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--gray-100);
        }

        .learning-objectives {
            list-style: none;
            padding: 0;
        }

        .learning-objectives li {
            padding: var(--space-md);
            margin-bottom: var(--space-sm);
            background: var(--gray-50);
            border-radius: var(--radius-md);
            display: flex;
            align-items: flex-start;
            gap: var(--space-md);
        }

        .learning-objectives li::before {
            content: '✓';
            color: var(--success);
            font-weight: 700;
            font-size: var(--text-xl);
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: var(--space-md);
            margin-top: var(--space-2xl);
            flex-wrap: wrap;
        }

        .download-progress {
            background: var(--info-light);
            border: 2px solid var(--info);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-top: var(--space-md);
            display: none;
        }

        .download-progress.active {
            display: block;
        }

        @media (max-width: 768px) {
            .module-hero {
                padding: var(--space-xl) var(--space-md);
            }

            .video-section {
                padding: var(--space-md);
            }

            .content-section {
                padding: var(--space-lg);
            }

            .navigation-buttons {
                flex-direction: column;
            }

            .navigation-buttons .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Module Hero -->
    <div class="module-hero">
        <div class="container">
            <span class="badge"
                style="background: rgba(255,255,255,0.2); color: white; font-size: var(--text-base); padding: 0.5rem 1rem; margin-bottom: var(--space-md);">
                Module <span id="moduleNumber">1</span> of 5
            </span>
            <h1 id="moduleTitle">Loading...</h1>
            <p id="moduleDescription">Loading module description...</p>
            <div class="module-meta-hero">
                <div class="meta-item">
                    <span>⏱️</span>
                    <span id="moduleDuration">45 min</span>
                </div>
                <div class="meta-item">
                    <span>📹</span>
                    <span>Video Lesson</span>
                </div>
                <div class="meta-item">
                    <span id="statusIcon">⏳</span>
                    <span id="statusText">Not Started</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Module Container -->
    <div class="module-container">
        <!-- Back Button -->
        <a href="contents.html" class="btn btn-secondary" style="margin-bottom: var(--space-lg);">
            ← Back to Contents
        </a>

        <!-- Video Section -->
        <div class="video-section">
            <h2>📹 Video Lesson</h2>
            <div class="video-wrapper" id="videoWrapper">
                <div class="video-placeholder" id="videoPlaceholder">
                    <div class="play-button" onclick="loadVideo()">▶</div>
                    <p>Click to start the lesson</p>
                </div>
            </div>
            <div class="video-controls">
                <button class="btn btn-primary" onclick="loadVideo()">
                    ▶️ Play Video
                </button>
                <button class="btn btn-secondary" onclick="downloadVideo()">
                    📥 Download for Offline
                </button>
                <button class="btn btn-success" onclick="markComplete()" id="completeBtn">
                    ✅ Mark as Complete
                </button>
            </div>
            <div class="download-progress" id="downloadProgress">
                <p><strong>📥 Downloading video for offline viewing...</strong></p>
                <div class="progress progress-lg" style="margin-top: var(--space-md);">
                    <div class="progress-bar" id="downloadBar" style="width: 0%"></div>
                </div>
                <p class="text-muted" style="margin-top: var(--space-sm); margin-bottom: 0;">
                    <span id="downloadPercent">0</span>% complete
                </p>
            </div>
        </div>

        <!-- Learning Objectives -->
        <div class="content-section">
            <h2>🎯 Learning Objectives</h2>
            <ul class="learning-objectives" id="learningObjectives">
                <!-- Will be populated by JavaScript -->
            </ul>
        </div>

        <!-- Key Topics -->
        <div class="content-section">
            <h2>📚 Key Topics Covered</h2>
            <div id="keyTopics">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>

        <!-- Navigation -->
        <div class="navigation-buttons">
            <button class="btn btn-secondary" id="prevBtn" onclick="navigateModule(-1)">
                ← Previous Module
            </button>
            <button class="btn btn-primary" id="nextBtn" onclick="navigateModule(1)">
                Next Module →
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Get module ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const moduleId = parseInt(urlParams.get('id')) || 1;

        // Extended module data with learning objectives
        const moduleDetails = {
            1: {
                objectives: [
                    'Understand the importance of financial literacy in daily life',
                    'Learn basic financial terminology and concepts',
                    'Recognize the impact of financial decisions on your future',
                    'Identify common financial mistakes and how to avoid them'
                ],
                topics: [
                    'What is Financial Literacy?',
                    'Why Financial Literacy Matters',
                    'Basic Financial Concepts',
                    'Financial Goals and Planning',
                    'Common Financial Pitfalls'
                ]
            },
            2: {
                objectives: [
                    'Create a personal or household budget',
                    'Track income and expenses effectively',
                    'Develop healthy saving habits',
                    'Set realistic financial goals',
                    'Use budgeting tools and apps'
                ],
                topics: [
                    'Understanding Income and Expenses',
                    'Creating Your First Budget',
                    'The 50/30/20 Rule',
                    'Saving Strategies',
                    'Emergency Fund Basics',
                    'Budgeting Tools and Apps'
                ]
            },
            3: {
                objectives: [
                    'Understand different types of bank accounts',
                    'Learn how to use ATMs and online banking safely',
                    'Master mobile banking and digital payment apps',
                    'Recognize and avoid digital fraud',
                    'Use digital wallets effectively'
                ],
                topics: [
                    'Types of Bank Accounts',
                    'Opening a Bank Account',
                    'ATM Usage and Safety',
                    'Online Banking Features',
                    'Mobile Banking Apps',
                    'Digital Payment Systems (bKash, Nagad, Rocket)',
                    'Security Best Practices'
                ]
            },
            4: {
                objectives: [
                    'Understand the remittance process',
                    'Compare different remittance channels',
                    'Learn how to send and receive money safely',
                    'Minimize remittance costs',
                    'Track and manage remittances effectively'
                ],
                topics: [
                    'What is Remittance?',
                    'Formal vs Informal Channels',
                    'Choosing the Right Service',
                    'Cost Comparison',
                    'Safety and Security',
                    'Documentation Requirements',
                    'Managing Received Remittances'
                ]
            },
            5: {
                objectives: [
                    'Understand basic investment principles',
                    'Learn about different investment options',
                    'Recognize the importance of insurance',
                    'Choose appropriate insurance coverage',
                    'Balance risk and return in investments'
                ],
                topics: [
                    'Introduction to Investing',
                    'Types of Investments (Savings, Bonds, Stocks)',
                    'Risk and Return',
                    'Diversification Basics',
                    'Types of Insurance (Life, Health, Property)',
                    'Choosing Insurance Coverage',
                    'Long-term Financial Planning'
                ]
            }
        };

        // Load module data
        function loadModuleData() {
            const module = demoData.modules.find(m => m.id === moduleId);
            if (!module) {
                window.location.href = 'contents.html';
                return;
            }

            const details = moduleDetails[moduleId];
            const progress = getModuleProgress();
            const isCompleted = progress[moduleId] === true;

            // Update header
            document.getElementById('moduleNumber').textContent = moduleId;
            document.getElementById('moduleTitle').textContent = module.title;
            document.getElementById('moduleDescription').textContent = module.description;
            document.getElementById('moduleDuration').textContent = module.duration;

            // Update status
            if (isCompleted) {
                document.getElementById('statusIcon').textContent = '✅';
                document.getElementById('statusText').textContent = 'Completed';
                document.getElementById('completeBtn').textContent = '✅ Completed';
                document.getElementById('completeBtn').classList.remove('btn-success');
                document.getElementById('completeBtn').classList.add('btn-secondary');
            }

            // Populate learning objectives
            const objectivesList = document.getElementById('learningObjectives');
            objectivesList.innerHTML = details.objectives.map(obj =>
                `<li>${obj}</li>`
            ).join('');

            // Populate key topics
            const topicsDiv = document.getElementById('keyTopics');
            topicsDiv.innerHTML = `
        <div class="grid grid-cols-1 grid-md-2 gap-md">
          ${details.topics.map((topic, index) => `
            <div style="padding: var(--space-md); background: var(--gray-50); border-radius: var(--radius-md); display: flex; align-items: center; gap: var(--space-md);">
              <span style="background: var(--primary-100); color: var(--primary-700); width: 2rem; height: 2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;">${index + 1}</span>
              <span>${topic}</span>
            </div>
          `).join('')}
        </div>
      `;

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = moduleId === 1;
            document.getElementById('nextBtn').disabled = moduleId === 5;

            if (moduleId === 1) {
                document.getElementById('prevBtn').style.opacity = '0.5';
            }
            if (moduleId === 5) {
                document.getElementById('nextBtn').style.opacity = '0.5';
            }
        }

        // Load video
        function loadVideo() {
            const module = demoData.modules.find(m => m.id === moduleId);
            const videoWrapper = document.getElementById('videoWrapper');

            // For demo, using a sample YouTube video
            // In production, this would be the actual course video
            videoWrapper.innerHTML = `
        <iframe 
          src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
        </iframe>
      `;
        }

        // Download video for offline
        function downloadVideo() {
            const downloadProgress = document.getElementById('downloadProgress');
            const downloadBar = document.getElementById('downloadBar');
            const downloadPercent = document.getElementById('downloadPercent');

            downloadProgress.classList.add('active');

            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                downloadBar.style.width = progress + '%';
                downloadPercent.textContent = progress;

                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        downloadProgress.classList.remove('active');
                        alert('Video downloaded successfully! You can now watch it offline.');
                    }, 500);
                }
            }, 100);
        }

        // Mark module as complete
        function markComplete() {
            const progress = getModuleProgress();

            if (progress[moduleId] === true) {
                alert('This module is already marked as complete!');
                return;
            }

            if (confirm('Mark this module as complete?')) {
                saveModuleProgress(moduleId, true);

                // Update UI
                document.getElementById('statusIcon').textContent = '✅';
                document.getElementById('statusText').textContent = 'Completed';
                document.getElementById('completeBtn').textContent = '✅ Completed';
                document.getElementById('completeBtn').classList.remove('btn-success');
                document.getElementById('completeBtn').classList.add('btn-secondary');

                // Check if all modules completed
                if (allModulesCompleted()) {
                    setTimeout(() => {
                        if (confirm('Congratulations! You\'ve completed all modules. Would you like to view your certificate?')) {
                            window.location.href = 'certificate.html';
                        }
                    }, 500);
                } else {
                    alert('Module marked as complete! 🎉');
                }
            }
        }

        // Navigate between modules
        function navigateModule(direction) {
            const newModuleId = moduleId + direction;
            if (newModuleId >= 1 && newModuleId <= 5) {
                window.location.href = `module-detail.html?id=${newModuleId}`;
            }
        }

        // Initialize
        loadModuleData();
    </script>
</body>

</html>
