<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - LMS Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: var(--shadow-lg);
            padding: var(--space-md) var(--space-lg);
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .menu-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            font-size: var(--text-2xl);
            cursor: pointer;
            padding: var(--space-sm);
            border-radius: var(--radius-md);
            transition: background var(--transition-fast);
            color: white;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            cursor: pointer;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            transition: background var(--transition-fast);
        }

        .navbar-user:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: var(--text-lg);
        }

        .user-info {
            display: none;
        }

        .user-name {
            font-weight: 600;
            color: white;
            font-size: var(--text-sm);
        }

        .user-role {
            font-size: var(--text-xs);
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: white;
            box-shadow: var(--shadow-xl);
            z-index: var(--z-fixed);
            transition: left var(--transition-base);
            overflow-y: auto;
            padding: var(--space-lg);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: var(--space-lg) 0;
            border-bottom: 2px solid var(--gray-100);
            margin-bottom: var(--space-lg);
        }

        .sidebar-logo {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-lg);
            color: var(--gray-700);
            text-decoration: none;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .sidebar-link:hover {
            background: var(--gray-50);
            color: var(--primary-600);
            transform: translateX(4px);
        }

        .sidebar-link.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .sidebar-icon {
            font-size: var(--text-xl);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: var(--space-lg);
            border-top: 2px solid var(--gray-100);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-2xl);
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--space-xl);
        }

        .course-card {
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
        }

        .course-thumbnail {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
            position: relative;
        }

        .course-category {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
        }

        .course-content {
            padding: var(--space-xl);
        }

        .course-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-sm);
        }

        .course-description {
            color: var(--gray-600);
            font-size: var(--text-sm);
            margin-bottom: var(--space-lg);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            gap: var(--space-lg);
            margin-bottom: var(--space-lg);
        }

        .course-meta-item {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: var(--text-sm);
            color: var(--gray-500);
        }

        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-modules {
            font-size: var(--text-sm);
            color: var(--primary-600);
            font-weight: 600;
        }

        @media (min-width: 640px) {
            .user-info {
                display: block;
            }
        }

        @media (min-width: 1024px) {
            .sidebar {
                left: 0;
            }

            .main-content {
                margin-left: 280px;
            }

            .menu-toggle {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
        <a href="landing.html" class="navbar-brand">
            📚 LMS Solution
        </a>
        <div class="navbar-actions">
            <div class="navbar-user" onclick="window.location.href='profile.html'">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userName">User</div>
                    <div class="user-role" id="userRole">Admin</div>
                </div>
            </div>
            <button class="btn btn-sm btn-nav" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">📚 LMS</div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <!-- Menu items will be populated by JavaScript -->
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-danger btn-full" onclick="logout()">
                🚪 Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div>
                    <h1>📚 Courses</h1>
                    <p class="text-muted">Browse and manage learning courses</p>
                </div>
                <button class="btn btn-primary" onclick="openModal('addCourseModal')" id="addCourseBtn">
                    ➕ Add New Course
                </button>
            </div>

            <!-- Courses Grid -->
            <div class="courses-grid" id="coursesGrid">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Add Course Modal -->
    <div class="modal-backdrop" id="addCourseModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title">Add New Course</h3>
                <button class="modal-close" onclick="closeModal('addCourseModal')">×</button>
            </div>
            <div class="modal-body">
                <form id="addCourseForm" onsubmit="handleAddCourse(event)">
                    <div class="form-group">
                        <label class="form-label form-label-required" for="courseTitle">Course Title</label>
                        <input type="text" id="courseTitle" class="form-input"
                            placeholder="e.g., Digital Financial Literacy" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label-required" for="courseDescription">Description</label>
                        <textarea id="courseDescription" class="form-textarea" rows="3"
                            placeholder="Describe what learners will gain from this course..." required></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label form-label-required" for="courseCategory">Category</label>
                            <select id="courseCategory" class="form-select" required>
                                <option value="">Select Category</option>
                                <option value="Financial Literacy">Financial Literacy</option>
                                <option value="Digital Skills">Digital Skills</option>
                                <option value="Business">Business</option>
                                <option value="Health">Health & Safety</option>
                                <option value="Agriculture">Agriculture</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label form-label-required" for="courseDuration">Total Duration</label>
                            <input type="text" id="courseDuration" class="form-input" placeholder="e.g., 4 hours 30 min"
                                required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label form-label-required" for="moduleCount">Number of Modules</label>
                            <input type="number" id="moduleCount" class="form-input" min="1" placeholder="e.g., 5"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="courseThumbnail">Thumbnail Image</label>
                            <input type="file" id="courseThumbnail" class="form-input" accept="image/*">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addCourseModal')">Cancel</button>
                <button class="btn btn-success" onclick="document.getElementById('addCourseForm').requestSubmit()">
                    ✅ Submit
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Demo courses data
        const courses = [
            {
                id: 1,
                title: 'Digital Financial Literacy',
                description: 'Learn essential financial concepts including budgeting, saving, banking services, and digital payments.',
                category: 'Financial Literacy',
                duration: '4h 30min',
                modules: 5,
                icon: '💰',
                gradient: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
            },
            {
                id: 2,
                title: 'Mobile Banking Essentials',
                description: 'Master mobile banking applications, understand security practices, and navigate digital financial services.',
                category: 'Digital Skills',
                duration: '2h 15min',
                modules: 3,
                icon: '📱',
                gradient: 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)'
            },
            {
                id: 3,
                title: 'Small Business Management',
                description: 'Learn how to start and manage a small business, track finances, and grow your enterprise.',
                category: 'Business',
                duration: '5h 00min',
                modules: 6,
                icon: '🏪',
                gradient: 'linear-gradient(135deg, #ee0979 0%, #ff6a00 100%)'
            },
            {
                id: 4,
                title: 'Agricultural Best Practices',
                description: 'Discover modern farming techniques, sustainable practices, and market opportunities.',
                category: 'Agriculture',
                duration: '3h 45min',
                modules: 4,
                icon: '🌾',
                gradient: 'linear-gradient(135deg, #56ab2f 0%, #a8e063 100%)'
            }
        ];

        // Update user avatar
        const userName = getUserName();
        document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();

        // Hide add button for beneficiaries
        const role = getUserRole();
        if (role === 'beneficiary') {
            document.getElementById('addCourseBtn').style.display = 'none';
        }

        function renderCourses() {
            const grid = document.getElementById('coursesGrid');

            grid.innerHTML = courses.map(course => `
                <div class="course-card" onclick="viewCourse(${course.id})">
                    <div class="course-thumbnail" style="background: ${course.gradient}">
                        ${course.icon}
                        <span class="course-category">${course.category}</span>
                    </div>
                    <div class="course-content">
                        <div class="course-title">${course.title}</div>
                        <div class="course-description">${course.description}</div>
                        <div class="course-meta">
                            <div class="course-meta-item">
                                ⏱️ ${course.duration}
                            </div>
                            <div class="course-meta-item">
                                📚 ${course.modules} Modules
                            </div>
                        </div>
                        <div class="course-footer">
                            <span class="course-modules">View Modules →</span>
                            <button class="btn btn-sm btn-primary">Start</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function viewCourse(id) {
            window.location.href = `contents.html?courseId=${id}`;
        }

        function handleAddCourse(event) {
            event.preventDefault();

            const newCourse = {
                id: courses.length + 1,
                title: document.getElementById('courseTitle').value,
                description: document.getElementById('courseDescription').value,
                category: document.getElementById('courseCategory').value,
                duration: document.getElementById('courseDuration').value,
                modules: parseInt(document.getElementById('moduleCount').value),
                icon: '📘',
                gradient: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'
            };

            courses.push(newCourse);
            renderCourses();
            closeModal('addCourseModal');
            document.getElementById('addCourseForm').reset();
            alert('Course created successfully! 🎉');
        }

        // Initialize
        renderCourses();
    </script>
</body>

</html>
