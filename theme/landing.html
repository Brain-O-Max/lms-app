<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Solution - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--gray-200);
            padding: var(--space-md) var(--space-lg);
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .menu-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            font-size: var(--text-2xl);
            cursor: pointer;
            padding: var(--space-sm);
            border-radius: var(--radius-md);
            transition: background var(--transition-fast);
            color: white;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            cursor: pointer;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            transition: background var(--transition-fast);
        }

        .navbar-user:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: var(--text-lg);
        }

        .user-info {
            display: none;
        }

        .user-name {
            font-weight: 600;
            color: white;
            font-size: var(--text-sm);
        }

        .user-role {
            font-size: var(--text-xs);
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .landing-hero {
            background: white;
            padding: var(--space-3xl) var(--space-md);
            text-align: center;
            margin-bottom: var(--space-2xl);
            border-bottom-left-radius: var(--radius-2xl);
            border-bottom-right-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            animation: fadeIn var(--transition-slow);
        }

        .landing-hero h1 {
            font-size: var(--text-3xl);
            margin-bottom: var(--space-sm);
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp var(--transition-base);
        }

        .landing-hero p {
            font-size: var(--text-base);
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp var(--transition-base) 0.1s both;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-md);
            padding: 0 var(--space-md);
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--space-md) var(--space-sm);
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: var(--gray-800);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-200);
        }

        .menu-card:hover::before {
            transform: scaleX(1);
        }

        .menu-card-icon {
            font-size: 2.5rem;
            margin-bottom: var(--space-sm);
            display: block;
        }

        .menu-card-title {
            font-size: var(--text-lg);
            font-weight: 700;
            margin-bottom: var(--space-xs);
            color: var(--gray-900);
        }

        .menu-card-desc {
            font-size: var(--text-sm);
            color: var(--gray-500);
        }

        .menu-card.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .menu-card.primary .menu-card-title,
        .menu-card.primary .menu-card-desc {
            color: white;
        }

        .menu-card.primary .menu-card-desc {
            opacity: 0.9;
        }

        .menu-card.primary::before {
            background: rgba(255, 255, 255, 0.5);
        }

        .section-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: var(--space-md);
            padding: 0 var(--space-md);
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .section-divider {
            border: none;
            height: 2px;
            background: var(--gray-100);
            margin: var(--space-2xl) auto;
            max-width: 1200px;
        }

        @media (min-width: 640px) {
            .landing-hero {
                padding: var(--space-3xl) var(--space-xl);
            }

            .landing-hero h1 {
                font-size: var(--text-4xl);
                margin-bottom: var(--space-md);
            }

            .landing-hero p {
                font-size: var(--text-lg);
            }

            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: var(--space-lg);
                padding: 0 var(--space-xl);
            }

            .menu-card {
                padding: var(--space-xl);
            }

            .menu-card-icon {
                font-size: 3rem;
                margin-bottom: var(--space-md);
            }

            .section-title {
                margin-bottom: var(--space-lg);
                padding: 0 var(--space-xl);
            }

            .user-info {
                display: block;
            }
        }

        @media (min-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="landing.html" class="navbar-brand">
            📚 LMS Solution
        </a>
        <div class="navbar-actions">
            <select class="form-select"
                style="font-size: var(--text-sm); padding: 0.5rem; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);"
                onchange="switchRole(this.value)" id="roleSwitcher">
                <option value="" style="color: #333;">🔄 Switch Role</option>
                <option value="admin" style="color: #333;">Admin</option>
                <option value="headoffice" style="color: #333;">Head Office</option>
                <option value="territorymanager" style="color: #333;">Territory Manager</option>
                <option value="unitmanager" style="color: #333;">Unit Manager</option>
                <option value="ro" style="color: #333;">RO</option>
                <option value="beneficiary" style="color: #333;">Beneficiary</option>
            </select>
            <div class="navbar-user" onclick="window.location.href='profile.html'">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userName">User</div>
                    <div class="user-role" id="userRole">Admin</div>
                </div>
            </div>
            <button class="btn btn-sm btn-nav" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="landing-hero">
        <h1>Welcome to LMS Solution</h1>
        <p id="welcomeMessage">Manage your learning management system with ease. Select a feature below to get started.
        </p>
    </div>

    <!-- Main Features -->
    <h2 class="section-title">📌 Quick Access</h2>
    <div class="menu-grid" id="mainMenu">
        <!-- Will be populated by JavaScript based on role -->
    </div>

    <!-- Admin Tools Section (visible only to admins) -->
    <div id="adminSection" style="display: none;">
        <hr class="section-divider">
        <h2 class="section-title">⚙️ Administration</h2>
        <div class="menu-grid" id="adminMenu">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Role switcher function
        function switchRole(newRole) {
            if (newRole) {
                localStorage.setItem('userRole', newRole);
                localStorage.setItem('userName', newRole.charAt(0).toUpperCase() + newRole.slice(1));
                window.location.reload();
            }
        }

        // Update user avatar
        const userName = getUserName();
        document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();

        // Populate menu based on role
        function populateMenu() {
            const role = getUserRole();
            const mainMenu = document.getElementById('mainMenu');
            const adminMenu = document.getElementById('adminMenu');
            const adminSection = document.getElementById('adminSection');

            // Common menu items for everyone
            const commonItems = [
                { icon: '📊', title: 'Analytics', desc: 'View insights & metrics', href: 'analytics.html', primary: true },
                { icon: '📚', title: 'Courses', desc: 'Browse courses', href: 'courses.html' },
                { icon: '📖', title: 'Modules', desc: 'Learning content', href: 'contents.html' },
            ];

            // Items for staff/managers
            const staffItems = [
                //{ icon: '👥', title: 'Sessions', desc: 'Training sessions', href: 'sessions.html' },
                { icon: '📄', title: 'Reports', desc: 'Generate reports', href: 'reports.html' },
                { icon: '🎓', title: 'Certificates', desc: 'Search certificates', href: 'certificate-search.html' },
            ];

            // Admin-only items
            const adminItems = [
                { icon: '🔐', title: 'Roles', desc: 'Manage roles', href: 'roles.html' },
                { icon: '🔑', title: 'Permissions', desc: 'Role permissions', href: 'permissions.html' },
                { icon: '👤', title: 'Users', desc: 'User management', href: 'users.html' },
                { icon: '⚙️', title: 'Settings', desc: 'System settings', href: 'admin-settings.html' },
            ];

            // Profile for everyone
            const profileItem = { icon: '👤', title: 'Profile', desc: 'Your profile', href: 'profile.html' };

            let menuItems = [...commonItems];

            if (role === 'beneficiary') {
                mainMenu.innerHTML = [
                    { icon: '📚', title: 'My Learning', desc: 'Continue learning', href: 'contents.html', primary: true },
                    { icon: '📊', title: 'My Progress', desc: 'Track progress', href: 'analytics.html' },
                    profileItem
                ].map(item => createMenuCard(item)).join('');
                document.getElementById('welcomeMessage').textContent = 'Continue your learning journey. Access your courses and track your progress.';
            } else {
                menuItems = [...commonItems, ...staffItems, profileItem];
                mainMenu.innerHTML = menuItems.map(item => createMenuCard(item)).join('');

                if (role === 'admin') {
                    adminSection.style.display = 'block';
                    adminMenu.innerHTML = adminItems.map(item => createMenuCard(item)).join('');
                }
            }
        }

        function createMenuCard(item) {
            return `
                <a href="${item.href}" class="menu-card ${item.primary ? 'primary' : ''}">
                    <span class="menu-card-icon">${item.icon}</span>
                    <div class="menu-card-title">${item.title}</div>
                    <div class="menu-card-desc">${item.desc}</div>
                </a>
            `;
        }

        // Initialize
        populateMenu();
    </script>
</body>

</html>
